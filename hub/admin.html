<style>
  :root {
    --red: #CC0000;
    --text: #1a1a1a;
    --muted: #888;
    --bg: #EFEFEF;
    --card: #ffffff;
    --border: rgba(0,0,0,0.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    min-height: 100%;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .page { max-width: 980px; margin: 0 auto; padding: 94px 24px 60px; }

  .page-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .page-desc { font-size: 13.5px; color: var(--muted); margin-bottom: 24px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 22px; }
  .tab-btn {
    padding: 9px 18px; border-radius: 30px; border: 1.5px solid var(--border);
    background: #fff; font-size: 13px; font-weight: 700; color: var(--muted);
    cursor: pointer; font-family: Arial, sans-serif;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tab-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px;
    margin-bottom: 24px;
  }
  .card h2 { font-size: 15px; margin-bottom: 14px; }

  .invite-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .field { flex: 1; min-width: 180px; margin-bottom: 12px; }
  .field label {
    display: block; font-size: 11.5px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--red); margin-bottom: 5px;
  }
  .field input, .field select {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 13.5px; font-family: Arial, sans-serif;
    color: var(--text); background: #fff; outline: none;
  }
  .field input:focus, .field select:focus {
    border-color: var(--red); box-shadow: 0 0 0 3px rgba(204,0,0,0.08);
  }
  .field input:disabled { background: #f4f4f4; color: var(--muted); }
  .btn-invite {
    background: linear-gradient(180deg, #e81010 0%, var(--red) 100%);
    color: #fff; border: none; border-radius: 10px;
    padding: 10px 18px; font-size: 13.5px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    box-shadow: 0 4px 18px rgba(204,0,0,0.3);
  }
  .btn-invite:hover { filter: brightness(1.08); }
  .btn-invite:disabled { opacity: 0.6; cursor: default; }

  .msg {
    font-size: 13px; padding: 10px 12px; border-radius: 10px;
    margin-top: 12px; display: none;
  }
  .msg.error { display: block; background: #fdeaea; color: #a30000; }
  .msg.ok { display: block; background: #eaf7ea; color: #1a7a1a; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); padding: 8px 6px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .rol-badge {
    display: inline-block; padding: 2px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 700; text-transform: capitalize;
  }
  .rol-master { background: #f5e0ff; color: #7a1fa2; }
  .rol-admin { background: #f5f0ff; color: #6741d9; }
  .rol-staff { background: #e7f5ff; color: #1971c2; }
  .rol-asociado { background: #f1f3f5; color: #495057; }

  .btn-editar-usuario {
    padding: 6px 12px; border-radius: 20px; border: 1.5px solid var(--border);
    background: #fff; font-size: 11.5px; font-weight: 700; color: var(--text);
    cursor: pointer; font-family: Arial, sans-serif;
  }
  .btn-editar-usuario:hover { border-color: var(--red); color: var(--red); }
  .btn-editar-usuario { text-decoration: none; display: inline-block; }
  .doc-acciones { display: flex; gap: 6px; flex-wrap: wrap; white-space: nowrap; }

  .doc-filtros {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
  }
  .doc-filtros input, .doc-filtros select {
    padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 13px; font-family: Arial, sans-serif; color: var(--text);
    background: #fff; outline: none;
  }
  .doc-filtros input:focus, .doc-filtros select:focus {
    border-color: var(--red); box-shadow: 0 0 0 3px rgba(204,0,0,0.08);
  }
  #doc-buscador { flex: 2; min-width: 200px; }
  .doc-filtros select, .doc-filtros input[type="date"] { flex: 1; min-width: 130px; }

  .denegado { text-align: center; padding: 60px 20px; color: var(--muted); }

  /* ── Móvil: las tablas se desplazan de lado dentro de su tarjeta en
     vez de desbordar la pantalla, y los espacios se compactan. ── */
  #usuarios-cont, #documentos-cont { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  @media (max-width: 700px) {
    .page { padding: 82px 14px 40px; }
    .card { padding: 16px 14px; }
    #usuarios-cont table, #documentos-cont table { min-width: 760px; }
    .page-title { font-size: 21px; }
    .tabs { flex-wrap: wrap; }
    .doc-filtros { flex-direction: column; }
    .doc-filtros input, .doc-filtros select { width: 100%; }
  }

  /* ── Modal: editar usuario ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-box {
    background: #fff; border-radius: 14px; padding: 24px;
    width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  }
  .modal-box h3 { font-size: 17px; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .btn-modal-cancelar, .btn-modal-confirmar {
    flex: 1; padding: 10px; border-radius: 30px; font-size: 13.5px; font-weight: 700;
    font-family: Arial, sans-serif; cursor: pointer; border: none;
  }
  .btn-modal-cancelar { background: #f2f2f2; color: var(--text); }
  .btn-modal-confirmar { background: var(--red); color: #fff; }
  .btn-eliminar-usuario {
    width: 100%; margin-top: 14px; padding: 10px; border-radius: 30px;
    font-size: 12.5px; font-weight: 700; font-family: Arial, sans-serif;
    background: none; border: 1.5px solid #a30000; color: #a30000; cursor: pointer;
  }
  .btn-eliminar-usuario:hover { background: #fdeaea; }
</style>

<script>
  const GESTIONAR_URL = 'https://iloetojomzqtadkithtv.supabase.co/functions/v1/gestionar-usuario';
  const INVITAR_URL = 'https://iloetojomzqtadkithtv.supabase.co/functions/v1/invitar-usuario';
  const APIKEY = 'sb_publishable_ZvaIC0_lkd6OQ0VMihOvjA_BIgpbClq';
  const ROLE_LABELS = { master: 'Master', admin: 'Admin', staff: 'Staff', asociado: 'Asociado' };
  const TIPO_LABELS = {
    carta_terminacion: 'Carta de Terminación Anticipada',
    aceptacion_oferta: 'Aceptación de Oferta de Arrendamiento',
    acuerdo_renta: 'Acuerdo de Renta',
    aviso_privacidad: 'Aviso de Privacidad',
    cedula_registro: 'Cédula de Registro de Cliente',
    checklist: 'Check List Vendedor y Comprador',
    colaboracion: 'Acuerdo de Colaboración entre Asesores',
    contrapropuesta: 'Contrapropuesta de Arrendamiento',
    referido: 'Formato de Referido'
  };
  const TIPO_URLS = {
    carta_terminacion: '../documentos/acuerdos/cartaterminacion.html',
    aceptacion_oferta: '../documentos/acuerdos/aceptacionoferta.html',
    acuerdo_renta: '../documentos/contratos/renta.html',
    aviso_privacidad: '../documentos/acuerdos/avisodeprivacidad.html',
    cedula_registro: '../documentos/acuerdos/cedularegistro.html',
    checklist: '../documentos/acuerdos/checklist.html',
    colaboracion: '../documentos/acuerdos/colaboracion.html',
    contrapropuesta: '../documentos/acuerdos/contrapropuesta.html',
    referido: '../documentos/acuerdos/referido.html'
  };

  let miRol = null;
  let miUserId = null;
  let usuariosCache = [];
  let documentosCache = [];
  let usuarioEnEdicion = null;

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  function fmtFechaCorta(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleDateString('es-MX', { year: 'numeric', month: 'short', day: 'numeric' }); }
    catch (e) { return ''; }
  }

  function cambiarTabPanel(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.getElementById('tab-usuarios').style.display = tab === 'usuarios' ? '' : 'none';
    document.getElementById('tab-documentos').style.display = tab === 'documentos' ? '' : 'none';
  }

  async function llamarFuncion(url, payload) {
    const { data: sessionData } = await window.kwSupabase.auth.getSession();
    const token = sessionData && sessionData.session && sessionData.session.access_token;
    if (!token) throw new Error('No hay sesión activa.');

    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'apikey': APIKEY },
      body: JSON.stringify(payload)
    });
    const raw = await resp.text();
    let body = {};
    let esJsonValido = false;
    try { body = raw ? JSON.parse(raw) : {}; esJsonValido = true; } catch (e) { /* no era JSON */ }

    if (!resp.ok) {
      let mensaje;
      if (typeof body.error === 'string' && body.error.trim()) mensaje = body.error;
      else if (!esJsonValido && raw && raw.trim()) mensaje = raw.trim();
      else mensaje = 'Error ' + resp.status + '. El servidor no envió un mensaje de error.';
      throw new Error(mensaje);
    }
    return body;
  }

  // ── Usuarios ──
  async function cargarUsuarios() {
    const cont = document.getElementById('usuarios-cont');
    try {
      const { data, error } = await window.kwSupabase
        .from('profiles')
        .select('id, nombre, apellido, email, role, created_at, oculto, puesto')
        .order('created_at', { ascending: false });
      if (error) throw error;
      usuariosCache = data || [];

      if (usuariosCache.length === 0) {
        cont.innerHTML = '<p style="color:var(--muted);font-size:13px;">No hay usuarios todavía.</p>';
        return;
      }

      let html = '<table><thead><tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Puesto</th><th>Alta</th><th>Visible en Asesores/Staff</th><th></th></tr></thead><tbody>';
      usuariosCache.forEach((u, i) => {
        const nombreCompleto = [u.nombre, u.apellido].filter(Boolean).join(' ') || '(sin nombre)';
        const puedoEditar = miRol === 'master' || (miRol === 'admin' && (u.role === 'staff' || u.role === 'asociado'));
        const oculto = !!u.oculto;
        html += `<tr>
          <td>${escapeHtml(nombreCompleto)}</td>
          <td>${escapeHtml(u.email)}</td>
          <td><span class="rol-badge rol-${escapeHtml(u.role)}">${escapeHtml(ROLE_LABELS[u.role] || u.role)}</span></td>
          <td>${escapeHtml(u.puesto || '—')}</td>
          <td>${fmtFechaCorta(u.created_at)}</td>
          <td>${oculto ? '<span style="color:#a30000;font-weight:700;">Oculto</span>' : '<span style="color:#1a7a1a;font-weight:700;">Visible</span>'}</td>
          <td style="display:flex;gap:6px;">
            ${puedoEditar ? `
