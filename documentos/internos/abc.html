<style>
  @view-transition { navigation: auto; }
  @media (prefers-reduced-motion: reduce) { @view-transition { navigation: none; } }

  ::view-transition-group(root) {
    animation-duration: 0.32s;
    animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  }
  ::view-transition-old(root) { animation-name: kw-exit-forward; }
  ::view-transition-new(root) { animation-name: kw-enter-forward; }
  :active-view-transition-type(back)::view-transition-old(root) { animation-name: kw-exit-back; }
  :active-view-transition-type(back)::view-transition-new(root) { animation-name: kw-enter-back; }

  @keyframes kw-enter-forward { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes kw-exit-forward  { from { transform: translateX(0); } to { transform: translateX(-100%); } }
  @keyframes kw-enter-back    { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  @keyframes kw-exit-back     { from { transform: translateX(0); } to { transform: translateX(100%); } }
</style>
<script>
  // Transición tipo app entre páginas: avanzar desliza de derecha a izquierda,
  // retroceder desliza de izquierda a derecha. Sin efecto en navegadores que no
  // soportan cross-document view transitions (Safari/Firefox) — navegación normal.
  //
  // La dirección se marca según QUÉ link se clickeó (el botón "Regresar", el logo
  // y el breadcrumb cuentan como "retroceso"; cualquier otro link cuenta como
  // "avance"), no según el historial del navegador — un link de "Regresar" es,
  // para el navegador, una navegación hacia adelante como cualquier otra.
  (function () {
    document.addEventListener('click', function (e) {
      var a = e.target.closest('a[href]');
      if (!a || a.target === '_blank') return;
      var url;
      try { url = new URL(a.href, location.href); } catch (err) { return; }
      if (url.origin !== location.origin) return;
      var isBack = !!a.closest('.back-btn, .breadcrumb, .logo');
      sessionStorage.setItem('kwPendingDirection', isBack ? 'back' : 'forward');
    }, true);

    function markDirection(event) {
      if (!event.viewTransition) return;
      var direction = sessionStorage.getItem('kwPendingDirection') || 'forward';
      sessionStorage.removeItem('kwPendingDirection');
      event.viewTransition.types.add(direction);
    }

    window.addEventListener('pageswap', markDirection);
    window.addEventListener('pagereveal', markDirection);
  })();
</script>
<style>
  :root {
    --red: #CC0000; --text: #1A1A1A; --muted: #888;
    --bg: #F5F5F5; --card: #ffffff; --border: rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden; /* el scroll vive dentro de cada columna, no en la página */
  }

  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    height: 100vh;
  }

  /* Columna formulario */
  .form-col {
    padding: 20px 18px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    height: 100%;
    background: var(--card);
  }
  .form-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .form-sub { font-size: 11px; color: var(--muted); margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--red); margin-bottom: 5px;
  }
  .field input,
  .field select {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
    border-radius: 10px; font-family: Arial, sans-serif; font-size: 13px;
    color: var(--text); background: #fff; outline: none; transition: border-color 0.15s;
  }
  .field input:focus,
  .field select:focus { border-color: var(--red); }
  .btn-dl {
    width: 100%; padding: 11px;
    background: linear-gradient(180deg,#CC0000 0%,#990000 100%);
    color: #fff; border: none; border-radius: 40px; font-family: Arial, sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 14px rgba(204,0,0,0.3); transition: filter 0.15s; margin-top: 20px;
  }
  .btn-dl:hover { filter: brightness(1.08); }
  .btn-dl:active { transform: scale(0.96); }

  /* Columna vista previa */
  .preview-col {
    overflow: auto;
    height: 100%;
    background: #d8d8d6;
    padding: 24px;
    display: flex; justify-content: center; align-items: flex-start;
  }

  /* ── Hoja tamaño Carta, fiel a las medidas reales de impresión ──
     @page { size: Letter portrait; margin: 2.5cm 3cm; } */
  .page {
    width: 816px;          /* 8.5in a 96dpi */
    height: 1056px;        /* 11in a 96dpi */
    padding: 94px 113px;   /* 2.5cm / 3cm convertidos a px */
    background: #fff;
    box-shadow: 0 4px 28px rgba(0,0,0,0.2);
    font-family: Arial, sans-serif;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .c-header-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .c-titulo-block { text-align: left; }
  .c-header-row .c-logo { margin-bottom: 0; }
  .c-line-top { width: 100%; height: 2.5px; background: var(--red); margin-bottom: 16px; }
  .c-logo img { height: 34px; width: auto; }
  .c-titulo {
    font-size: 19pt; font-weight: 800;
    letter-spacing: 0.04em; color: #1a1a1a;
  }
  .c-subtitulo {
    text-align: left; font-size: 9pt; font-weight: 700;
    color: #1a1a1a; margin-top: 2px;
  }
  .c-concedido {
    font-size: 9.5pt; color: #1a1a1a; margin-bottom: 14px; margin-top: 32px;
    display: flex; align-items: baseline; gap: 6px;
  }
  .c-concedido-linea { flex: 1; border-bottom: 1px solid #1a1a1a; margin-left: 4px; }
  .c-nombre-val { font-size: 9.5pt; font-weight: 600; color: #1a1a1a; min-width: 40px; }
  .c-body { font-size: 9.5pt; line-height: 1.6; color: #222; text-align: left; margin-bottom: 10px; }
  .c-logro { text-align: center; font-size: 12pt; font-weight: 700; color: var(--red); margin: 14px 0 16px; }

  /* ── Checklist de temas cubiertos ── */
  .c-checklist { border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px 8px; margin-bottom: 16px; }
  .c-checklist-title {
    font-size: 8.5pt; font-weight: 700; color: #1a1a1a;
    text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px;
  }
  .c-checklist-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px 16px; }
  .c-checklist-item { display: flex; align-items: flex-start; gap: 6px; font-size: 7.8pt; line-height: 1.35; color: #333; }
  .c-checkbox { width: 9px; height: 9px; border: 1px solid #999; border-radius: 2px; flex-shrink: 0; margin-top: 2px; }

  .c-firmas { display: flex; gap: 32px; }
  .c-firma { flex: 1; text-align: center; }
  .c-firma-linea { border-top: 1px solid #1a1a1a; padding-top: 5px; margin-bottom: 3px; }
  .c-firma-nombre { font-size: 9pt; font-weight: 700; color: #1a1a1a; }
  .c-firma-cargo { font-size: 8.5pt; color: #555; }

  /* En pantalla, campo vacío en rojo como guía visual; al exportar se limpia */
  .c-campo { color: #CC0000; }
  .c-campo.filled { color: inherit; }

  @media (max-width: 900px) {
    html, body { height: auto; overflow: auto; }
    .layout { grid-template-columns: 1fr; height: auto; }
    .form-col { height: auto; overflow-y: visible; }
  }

  .mobile-tabs {
    display: none;
    gap: 8px;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 30;
  }
  .mobile-tab {
    flex: 1;
    padding: 9px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: #fff;
    font-size: 12.5px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    font-family: Arial, sans-serif;
    color: var(--text);
  }
  .mobile-tab.active { background: var(--red); color: #fff; border-color: var(--red); }
  .mobile-tab:active { transform: scale(0.95); }
  @media (max-width: 900px) {
    .mobile-tabs { display: flex; }
    .preview-col { height: auto; overflow: visible; padding: 16px; min-width: 0; }
  }

  .page-scale-wrap {
    overflow: hidden;
    margin: 0 auto 16px;
  }
  .page-scale-wrap .page,
  .page-scale-wrap.single .page {
    transform-origin: top left;
  }
</style>
</head>

  function fmtFecha(iso) {
    if (!iso) return null;
    const d = new Date(iso + 'T12:00:00');
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return { dia: d.getDate(), mes: meses[d.getMonth()], anio: d.getFullYear() };

function fitPreviewMobile() {
  if (window.innerWidth > 900) return;
  const previewCol = document.querySelector('.preview-col');
  if (!previewCol || previewCol.style.display === 'none') return;
  const pages = previewCol.querySelectorAll('.page');
  if (!pages.length) return;
  const availWidth = previewCol.clientWidth - 24;
  const scale = Math.min(1, availWidth / 816);
  pages.forEach(page => {
    let wrap = page.parentElement;
    if (!wrap.classList.contains('page-scale-wrap')) {
      wrap = document.createElement('div');
      wrap.className = 'page-scale-wrap';
      page.parentNode.insertBefore(wrap, page);
      wrap.appendChild(page);
    }
    page.style.transform = `scale(${scale})`;
    wrap.style.width = (816 * scale) + 'px';
    wrap.style.height = (1056 * scale) + 'px';
  });
}

function showMobileTab(tab) {
  const formCol = document.querySelector('.form-col');
  const previewCol = document.querySelector('.preview-col');
  document.querySelectorAll('.mobile-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (!formCol || !previewCol) return;
  if (window.innerWidth > 900) {
    formCol.style.display = '';
    previewCol.style.display = '';
    return;
  }
  if (tab === 'form') {
    formCol.style.display = '';
    previewCol.style.display = 'none';
  } else {
    formCol.style.display = 'none';
    previewCol.style.display = '';
    requestAnimationFrame(fitPreviewMobile);
  }
}

window.addEventListener('resize', () => {
  const formCol = document.querySelector('.form-col');
  const previewCol = document.querySelector('.preview-col');
  if (window.innerWidth > 900) {
    if (formCol) formCol.style.display = '';
    if (previewCol) previewCol.style.display = '';
  } else {
    fitPreviewMobile();
  }
});

document.addEventListener('DOMContentLoaded', () => { showMobileTab('form'); });
</script>
