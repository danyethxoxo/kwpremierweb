<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acuerdo de Renta — KW Premier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #CC0000;
    --text: #1a1a1a;
    --muted: #888;
    --bg: #EFEFEF;
    --border: rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #e8e8e6;
    color: var(--text);
    overflow: hidden; /* el scroll vive dentro de cada columna, no en la página */
  }

  .acuerdos-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: 100vh;
  }

  /* Columna formulario */
  .acuerdos-form-col {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    height: 100%;
    padding: 24px;
    background: var(--bg);
  }
  .acuerdos-form-title {
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 4px;
  }
  .acuerdos-form-sub {
    font-size: 12px; color: var(--muted); margin-bottom: 18px;
  }
  .acuerdo-field { margin-bottom: 14px; }
  .acuerdo-field label {
    display: block;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: #CC0000; margin-bottom: 5px;
  }
  .acuerdo-field select,
  .acuerdo-field input,
  .acuerdo-field textarea {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    color: var(--text); background: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .acuerdo-field select:focus,
  .acuerdo-field input:focus,
  .acuerdo-field textarea:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(204,0,0,0.08);
  }
  .acuerdo-field .monto-letra-display {
    margin-top: 5px;
    font-size: 11px; color: #888; font-style: italic;
    min-height: 16px;
  }
  .acuerdo-field input[type="date"] { cursor: pointer; }

  .btn-download {
    width: 100%;
    background: linear-gradient(180deg, #e81010 0%, var(--red) 100%);
    color: #fff; border: none; border-radius: 40px;
    padding: 12px 20px; font-size: 13.5px; font-weight: 700;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 18px rgba(204,0,0,0.3);
    transition: filter 0.18s, transform 0.12s;
    margin-top: 0;
  }
  .btn-download:hover { filter: brightness(1.08); }
  .btn-download:active { transform: scale(0.98); }

  /* Columna vista previa */
  .acuerdos-preview-col {
    overflow: auto;
    height: 100%;
    background: #d8d8d6;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 20px;
  }

  /* ── Vista paginada: hojas tamaño Carta apiladas ── */
  .page-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }
  .page {
    background: #fff;
    width: 816px;         /* 8.5in a 96dpi */
    height: 1056px;        /* 11in a 96dpi */
    padding: 30px 76px 57px 76px; /* imita márgenes @page usados al imprimir */
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    border-radius: 2px;
    font-family: Arial, sans-serif;
    font-size: 10pt;
    line-height: 1.5;
    color: #000;
    box-sizing: border-box;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .page-number {
    position: absolute;
    bottom: 14px;
    right: 24px;
    font-size: 8pt;
    color: #aaa;
    font-family: Arial, sans-serif;
  }

  .doc-header { margin-bottom: 10px; }
  .doc-header img { height: 38px; width: auto; }

  .doc-titulo {
    text-align: center;
    font-weight: 700;
    font-size: 11pt;
    letter-spacing: 0.25em;
    margin: 0 0 14px;
    text-decoration: underline;
    font-family: Georgia, serif;
  }

  .doc-intro { text-align: justify; margin-bottom: 12px; font-size: 10pt; }
  .doc-seccion { font-weight: 700; margin: 14px 0 5px; text-decoration: underline; font-size: 10pt; }
  .doc-clausula-titulo { font-weight: 700; margin-top: 12px; display: inline; font-size: 10pt; }
  .doc-p { text-align: justify; margin-bottom: 5px; font-size: 10pt; }
  .doc-lista { margin: 3px 0 5px 22px; }
  .doc-lista li { margin-bottom: 3px; text-align: justify; font-size: 10pt; }

  .doc-campo { font-weight: 700; border-bottom: 1px solid #CC0000; color: #CC0000; }
  .doc-campo.filled { color: #000; border-bottom: none; font-weight: 700; }

  .doc-firmas-wrap { margin-top: 20px; }
  .doc-firmas-row { display: flex; gap: 0; margin-bottom: 16px; }
  .doc-firma-col { flex: 1; text-align: center; font-size: 9pt; line-height: 1.4; padding: 0 10px; }
  .doc-firma-linea-top { border-top: 1px solid #000; padding-top: 5px; margin-top: 28px; }
  .doc-firma-bold { font-weight: 700; font-size: 9pt; }

  @media (max-width: 900px) {
    html, body { height: auto; overflow: auto; }
    .acuerdos-body { grid-template-columns: 1fr; height: auto; }
    .acuerdos-form-col { height: auto; overflow-y: visible; }
    .acuerdos-preview-col { display: none; }
  }
</style>
</head>
<body>

<div class="acuerdos-body">

  <!-- Columna formulario -->
  <div class="acuerdos-form-col" id="acuerdos-form-col">
    <div class="acuerdos-form-title" id="excl-form-title">Acuerdo de Renta</div>
    <div class="acuerdos-form-sub">Completa los campos — la vista previa se actualiza en tiempo real.</div>

    <div class="acuerdo-field">
      <label>Tipo de acuerdo</label>
      <select id="f-tipo" onchange="updatePreview()">
        <option value="exclusiva">Exclusiva</option>
        <option value="opcion">En Opción</option>
      </select>
    </div>

    <div class="acuerdo-field">
      <label>Nombre del asesor</label>
      <input type="text" id="f-asesor" placeholder="Ej. Juan García López" oninput="updatePreview()" />
    </div>
    <div class="acuerdo-field">
      <label>Nombre del arrendador (cliente)</label>
      <input type="text" id="f-arrendador" placeholder="Nombre completo del propietario" oninput="updatePreview()" />
    </div>
    <div class="acuerdo-field">
      <label>Dirección del inmueble</label>
      <input type="text" id="f-inmueble" placeholder="Calle, número, colonia, alcaldía, CP" oninput="updatePreview()" />
    </div>
    <div class="acuerdo-field">
      <label>Monto mensual de renta (en número)</label>
      <input type="number" id="f-monto" placeholder="Ej. 25000" oninput="updateMontoLetra(); updatePreview();" />
      <div class="monto-letra-display" id="monto-letra-display">El monto en letra aparecerá aquí automáticamente.</div>
    </div>
    <div class="acuerdo-field">
      <label>Domicilio del cliente (arrendador)</label>
      <input type="text" id="f-domicilio" placeholder="Dirección donde recibe notificaciones" oninput="updatePreview()" />
    </div>
    <div class="acuerdo-field">
      <label>Fecha del acuerdo</label>
      <input type="date" id="f-fecha" oninput="updatePreview()" />
    </div>

    <div id="excl-aviso" style="display:none;margin-top:14px;padding:10px 12px;background:#fff8e1;border:1.5px solid #ffc107;border-radius:10px;font-size:12px;color:#7B5800;line-height:1.5;"></div>
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button class="btn-download" style="margin-top:0;flex:1;" onclick="downloadPDF()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PDF
      </button>
      <button class="btn-download" style="margin-top:0;flex:1;background:linear-gradient(180deg,#2b5be8 0%,#1a3fbf 100%);box-shadow:0 4px 18px rgba(27,63,191,0.3);" onclick="downloadWord(false)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Word
      </button>
    </div>
  </div>

  <!-- Columna vista previa -->
  <div class="acuerdos-preview-col">
    <div class="page-stack" id="contrato-preview"></div>
  </div>

  <!-- Contenedor oculto con el documento completo (sin paginar), usado para PDF/Word -->
  <div id="contrato-raw" style="display:none;"></div>

</div>

// ── Número a letra (pesos mexicanos) ──
function numeroALetra(num) {
  if (!num || isNaN(num) || num <= 0) return '';
  const UNIDADES = ['','UN','DOS','TRES','CUATRO','CINCO','SEIS','SIETE','OCHO','NUEVE',
    'DIEZ','ONCE','DOCE','TRECE','CATORCE','QUINCE','DIECISÉIS','DIECISIETE','DIECIOCHO','DIECINUEVE'];
  const DECENAS  = ['','DIEZ','VEINTE','TREINTA','CUARENTA','CINCUENTA','SESENTA','SETENTA','OCHENTA','NOVENTA'];
  const CENTENAS = ['','CIEN','DOSCIENTOS','TRESCIENTOS','CUATROCIENTOS','QUINIENTOS',
    'SEISCIENTOS','SETECIENTOS','OCHOCIENTOS','NOVECIENTOS'];

  function menos1000(n) {
    if (n === 0) return '';
    if (n === 100) return 'CIEN';
    let r = '';
    if (n >= 100) { r += CENTENAS[Math.floor(n/100)] + ' '; n %= 100; }
    if (n >= 20)  { r += DECENAS[Math.floor(n/10)]; n %= 10; if (n) r += ' Y '; }
    if (n > 0)    { r += UNIDADES[n] + ' '; }
    return r.trim();
  }

  function menos1M(n) {
    if (n === 0) return '';
    const miles = Math.floor(n / 1000);
    const resto = n % 1000;
    let r = '';
    if (miles === 1)  r = 'MIL ';
    else if (miles > 1) r = menos1000(miles) + ' MIL ';
    if (resto > 0)    r += menos1000(resto);
    return r.trim();
  }

  const entero = Math.floor(num);
  const cents  = Math.round((num - entero) * 100);
  let texto = '';

  if (entero >= 1000000) {
    const mill = Math.floor(entero / 1000000);
    const resto = entero % 1000000;
    texto += (mill === 1 ? 'UN MILLÓN' : menos1000(mill) + ' MILLONES');
    if (resto > 0) texto += ' ' + menos1M(resto);
  } else {
    texto = menos1M(entero) || 'CERO';
  }

  texto = texto.trim() + ' PESOS ' + String(cents).padStart(2,'0') + '/100 M.N.';
  return texto;
}

function updateMontoLetra() {
  const val = parseFloat(document.getElementById('f-monto').value);
  const display = document.getElementById('monto-letra-display');
  if (!val || val <= 0) {
    display.textContent = 'El monto en letra aparecerá aquí automáticamente.';
  } else {
    display.textContent = '→ ' + numeroALetra(val);
  }
}

// ── Formatear fecha en español ──
function formatFechaLarga(iso) {
  if (!iso) return '_____ de _____________ de _____';
  const [y, m, d] = iso.split('-').map(Number);
  const MESES = ['','enero','febrero','marzo','abril','mayo','junio',
    'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${d} de ${MESES[m]} de ${y}`;
}

// ── Campo con estilo: rojo si vacío, negro si lleno ──
function campo(val, placeholder) {
  if (val && val.trim()) {
    return `<span class="doc-campo filled">${val.trim()}</span>`;
  }
  return `<span class="doc-campo">${placeholder}</span>`;
}

// ── Renderizar vista previa ──
// ── Paginación: divide el contenido crudo en hojas tamaño Carta ──
// Los bloques (párrafos, secciones, listas, bloque de firmas, etc.) se tratan
// como unidades atómicas: si uno no cabe en el espacio restante de la hoja,
// se mueve completo a la siguiente (así no se corta un párrafo o firma a la mitad).
const PAGE_CONTENT_HEIGHT = 969; // alto útil aprox. de una hoja Carta con los márgenes de impresión

function renderPaginated() {
  const raw = document.getElementById('contrato-raw');
  const stack = document.getElementById('contrato-preview');
  if (!raw || !stack) return;

  // Medidor oculto con el mismo ancho de contenido que una hoja real
  const measurer = document.createElement('div');
  measurer.style.cssText = 'position:fixed;left:-99999px;top:0;width:664px;font-family:Arial,sans-serif;font-size:10pt;line-height:1.5;';
  document.body.appendChild(measurer);

  const nodes = Array.from(raw.children);
  const pagesHTML = [];
  let currentHTML = '';
  let currentHeight = 0;

  nodes.forEach(node => {
    const nodeHTML = node.outerHTML;
    measurer.innerHTML = currentHTML + nodeHTML;
    const newHeight = measurer.scrollHeight;

    if (newHeight > PAGE_CONTENT_HEIGHT && currentHTML !== '') {
      // No cabe: cerramos la página actual y empezamos una nueva con este bloque
      pagesHTML.push(currentHTML);
      currentHTML = nodeHTML;
      measurer.innerHTML = currentHTML;
      currentHeight = measurer.scrollHeight;
    } else {
      currentHTML += nodeHTML;
      currentHeight = newHeight;
    }
  });
  if (currentHTML) pagesHTML.push(currentHTML);
  if (pagesHTML.length === 0) pagesHTML.push('');

  document.body.removeChild(measurer);

  stack.innerHTML = pagesHTML.map((html, i) => `
    <div class="page">
      ${html}
      <div class="page-number">Página ${i + 1} de ${pagesHTML.length}</div>
    </div>
  `).join('');
}

// ── Descarga como Word (.docx) ──
async function downloadWord(blank = false) {
  const tipo      = blank ? 'exclusiva' : (document.getElementById('f-tipo')?.value || 'exclusiva');
  const esExclusiva = tipo === 'exclusiva';
  const asesor    = blank ? '' : document.getElementById('f-asesor')?.value.trim() || '';

  // Clonar el documento crudo y limpiar campos vacíos
  const raw = document.getElementById('contrato-raw');
  if (!raw) return;
  const clone = raw.cloneNode(true);
  clone.querySelectorAll('.doc-campo:not(.filled)').forEach(el => {
    el.style.color='#000'; el.style.borderBottom='1px solid #000'; el.textContent='_________________________';
  });

  const wordHTML = `<!DOCTYPE html>
<html xmlns:o='urn:schemas-microsoft-com:office:office'
      xmlns:w='urn:schemas-microsoft-com:office:word'
      xmlns='http://www.w3.org/TR/REC-html40'>
<head><meta charset='UTF-8'>
<title> </title>
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->
<style>
  body{font-family:Arial,sans-serif;font-size:10pt;line-height:1.5;color:#000;margin:2cm;}
  .doc-header img{height:30pt;width:auto;}
  .doc-titulo{text-align:center;font-weight:700;font-size:12pt;letter-spacing:0.15em;margin:0 0 8pt;text-decoration:underline;}
  .doc-intro,.doc-p{text-align:justify;margin-bottom:5pt;font-size:10pt;}
  .doc-seccion{font-weight:700;margin:8pt 0 3pt;text-decoration:underline;}
  .doc-clausula-titulo{font-weight:700;}
  .doc-campo{font-weight:700;border-bottom:1px solid #000;}
  .doc-campo.filled{border-bottom:none;}
  .doc-firmas-wrap{margin-top:20pt;}
  .doc-firmas-row{display:flex;margin-bottom:14pt;}
  .doc-firma-col{flex:1;text-align:center;font-size:8.5pt;padding:0 8pt;}
  .doc-firma-linea-top{border-top:1px solid #000;padding-top:5pt;margin-top:22pt;}
  .doc-firma-bold{font-weight:700;}
  .monto-letra-display{display:none;}
</style></head>
<body>${clone.innerHTML}</body></html>`;

  const blob = new Blob([wordHTML], {type: 'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (esExclusiva ? 'Acuerdo_Renta_Exclusiva' : 'Acuerdo_Renta_En_Opcion') + (asesor ? '_'+asesor.replace(/\s+/g,'_') : '') + '.doc';
  a.click();
  URL.revokeObjectURL(url);
}
