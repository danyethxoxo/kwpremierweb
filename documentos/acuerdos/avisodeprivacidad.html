<style>
  @view-transition { navigation: auto; }
  @media (prefers-reduced-motion: reduce) { @view-transition { navigation: none; } }

  ::view-transition-group(root) {
    animation-duration: 0.32s;
    animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  }
  ::view-transition-old(root) { animation-name: kw-exit-forward; }
  ::view-transition-new(root) { animation-name: kw-enter-forward; }
  :active-view-transition-type(back)::view-transition-old(root) { animation-name: kw-exit-back; }
  :active-view-transition-type(back)::view-transition-new(root) { animation-name: kw-enter-back; }

  @keyframes kw-enter-forward { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes kw-exit-forward  { from { transform: translateX(0); } to { transform: translateX(-100%); } }
  @keyframes kw-enter-back    { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  @keyframes kw-exit-back     { from { transform: translateX(0); } to { transform: translateX(100%); } }
</style>
<script>
  // Transición tipo app entre páginas: avanzar desliza de derecha a izquierda,
  // retroceder desliza de izquierda a derecha. Sin efecto en navegadores que no
  // soportan cross-document view transitions (Safari/Firefox) — navegación normal.
  //
  // La dirección se marca según QUÉ link se clickeó (el botón "Regresar", el logo
  // y el breadcrumb cuentan como "retroceso"; cualquier otro link cuenta como
  // "avance"), no según el historial del navegador — un link de "Regresar" es,
  // para el navegador, una navegación hacia adelante como cualquier otra.
  (function () {
    document.addEventListener('click', function (e) {
      var a = e.target.closest('a[href]');
      if (!a || a.target === '_blank') return;
      var url;
      try { url = new URL(a.href, location.href); } catch (err) { return; }
      if (url.origin !== location.origin) return;
      var isBack = !!a.closest('.back-btn, .breadcrumb, .logo');
      sessionStorage.setItem('kwPendingDirection', isBack ? 'back' : 'forward');
    }, true);

    function markDirection(event) {
      if (!event.viewTransition) return;
      var direction = sessionStorage.getItem('kwPendingDirection') || 'forward';
      sessionStorage.removeItem('kwPendingDirection');
      event.viewTransition.types.add(direction);
    }

    window.addEventListener('pageswap', markDirection);
    window.addEventListener('pagereveal', markDirection);
  })();
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #CC0000;
    --text: #1a1a1a;
    --muted: #888;
    --bg: #EFEFEF;
    --border: rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #e8e8e6;
    color: var(--text);
    overflow: hidden; /* el scroll vive dentro de cada columna, no en la página */
  }

  .acuerdos-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: 100vh;
  }

  /* Columna formulario */
  .acuerdos-form-col {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    height: 100%;
    padding: 24px;
    background: var(--bg);
  }
  .acuerdos-form-title {
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 4px;
  }
  .acuerdos-form-sub {
    font-size: 12px; color: var(--muted); margin-bottom: 18px;
  }
  .acuerdo-field { margin-bottom: 14px; }
  .acuerdo-field label {
    display: block;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: #CC0000; margin-bottom: 5px;
  }
  .acuerdo-field select,
  .acuerdo-field input,
  .acuerdo-field textarea {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    color: var(--text); background: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .acuerdo-field select:focus,
  .acuerdo-field input:focus,
  .acuerdo-field textarea:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(204,0,0,0.08);
  }
  .acuerdo-field .monto-letra-display {
    margin-top: 5px;
    font-size: 11px; color: #888; font-style: italic;
    min-height: 16px;
  }
  .acuerdo-field input[type="date"] { cursor: pointer; }

  .btn-download {
    width: 100%;
    background: linear-gradient(180deg, #e81010 0%, var(--red) 100%);
    color: #fff; border: none; border-radius: 40px;
    padding: 12px 20px; font-size: 13.5px; font-weight: 700;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 18px rgba(204,0,0,0.3);
    transition: filter 0.18s, transform 0.12s;
    margin-top: 0;
  }
  .btn-download:hover { filter: brightness(1.08); }
  .btn-download:active { transform: scale(0.96); }

  /* Columna vista previa */
  .acuerdos-preview-col {
    overflow: auto;
    height: 100%;
    background: #d8d8d6;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 20px;
  }

  /* ── Vista paginada: hojas tamaño Carta apiladas ── */
  .page-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }
  .page {
    background: #fff;
    width: 816px;         /* 8.5in a 96dpi */
    height: 1056px;        /* 11in a 96dpi */
    padding: 30px 76px 34px 76px; /* imita márgenes @page usados al imprimir */
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    border-radius: 2px;
    font-family: Arial, sans-serif;
    font-size: 10pt;
    line-height: 1.5;
    color: #000;
    box-sizing: border-box;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .page-number {
    position: absolute;
    bottom: 14px;
    right: 24px;
    font-size: 8pt;
    color: #aaa;
    font-family: Arial, sans-serif;
  }

  .doc-header { margin-bottom: 16pt; }
  .doc-header img { height: 30pt; width: auto; margin-bottom: 6pt; }

  .doc-titulo {
    text-align: center;
    font-weight: 700;
    font-size: 11pt;
    letter-spacing: 0.25em;
    margin: 0 0 10pt;
    text-decoration: underline;
  }

  .doc-intro, .doc-p { text-align: justify; margin-bottom: 4pt; font-size: 9.5pt; }
  .doc-seccion { font-weight: 700; margin: 10pt 0 4pt; text-decoration: underline; font-size: 10pt; }
  .doc-clausula-titulo { font-weight: 700; font-size: 10pt; }
  .doc-lista { margin: 2pt 0 4pt 18pt; }
  .doc-lista li { margin-bottom: 2pt; text-align: justify; font-size: 10pt; }

  /* En pantalla dejamos el campo vacío en rojo como guía visual;
     al imprimir/exportar downloadPDF() ya lo convierte a línea negra */
  .doc-campo { font-weight: 700; border-bottom: 1px solid #CC0000; color: #CC0000; }
  .doc-campo.filled { color: #000; border-bottom: none; font-weight: 700; }

  .doc-firmas-wrap { margin-top: 20pt; }
  .doc-firmas-row { display: flex; gap: 0; margin-bottom: 12pt; }
  .doc-firma-col { flex: 1; text-align: center; font-size: 8.5pt; line-height: 1.4; padding: 0 8pt; }
  .doc-firma-linea-top { border-top: 1px solid #000; padding-top: 4pt; margin-top: 22pt; }
  .doc-firma-bold { font-weight: 700; font-size: 8.5pt; }
  .pv-firmas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22pt 14pt; }
  .pv-firma-item { text-align: center; font-size: 8.5pt; line-height: 1.4; padding: 0 6pt; }

  @media (max-width: 900px) {
    html, body { height: auto; overflow: auto; }
    .acuerdos-body { grid-template-columns: 1fr; height: auto; }
    .acuerdos-form-col { height: auto; overflow-y: visible; }
  }

  .mobile-tabs {
    display: none;
    gap: 8px;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 30;
  }
  .mobile-tab {
    flex: 1;
    padding: 9px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: #fff;
    font-size: 12.5px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    font-family: Arial, sans-serif;
    color: var(--text);
  }
  .mobile-tab.active { background: var(--red); color: #fff; border-color: var(--red); }
  .mobile-tab:active { transform: scale(0.95); }
  @media (max-width: 900px) {
    .mobile-tabs { display: flex; }
    .acuerdos-preview-col { height: auto; overflow: visible; padding: 16px; min-width: 0; }
  }

  .page-scale-wrap {
    overflow: hidden;
    margin: 0 auto 16px;
  }
  .page-scale-wrap .page,
  .page-scale-wrap.single .page {
    transform-origin: top left;
  }
</style>
</head>

// ── Número a letra (pesos mexicanos) ──
function numeroALetra(num) {
  if (!num || isNaN(num) || num <= 0) return '';
  const UNIDADES = ['','UN','DOS','TRES','CUATRO','CINCO','SEIS','SIETE','OCHO','NUEVE',
    'DIEZ','ONCE','DOCE','TRECE','CATORCE','QUINCE','DIECISÉIS','DIECISIETE','DIECIOCHO','DIECINUEVE'];
  const DECENAS  = ['','DIEZ','VEINTE','TREINTA','CUARENTA','CINCUENTA','SESENTA','SETENTA','OCHENTA','NOVENTA'];
  const CENTENAS = ['','CIEN','DOSCIENTOS','TRESCIENTOS','CUATROCIENTOS','QUINIENTOS',
    'SEISCIENTOS','SETECIENTOS','OCHOCIENTOS','NOVECIENTOS'];

  function menos1000(n) {
    if (n === 0) return '';
    if (n === 100) return 'CIEN';
    let r = '';
    if (n >= 100) { r += CENTENAS[Math.floor(n/100)] + ' '; n %= 100; }
    if (n >= 20)  { r += DECENAS[Math.floor(n/10)]; n %= 10; if (n) r += ' Y '; }
    if (n > 0)    { r += UNIDADES[n] + ' '; }
    return r.trim();
  }

  function menos1M(n) {
    if (n === 0) return '';
    const miles = Math.floor(n / 1000);
    const resto = n % 1000;
    let r = '';
    if (miles === 1)  r = 'MIL ';
    else if (miles > 1) r = menos1000(miles) + ' MIL ';
    if (resto > 0)    r += menos1000(resto);
    return r.trim();
  }

  const entero = Math.floor(num);
  const cents  = Math.round((num - entero) * 100);
  let texto = '';

  if (entero >= 1000000) {
    const mill = Math.floor(entero / 1000000);
    const resto = entero % 1000000;
    texto += (mill === 1 ? 'UN MILLÓN' : menos1000(mill) + ' MILLONES');
    if (resto > 0) {
      texto += ' ' + menos1M(resto);
    } else {
      texto += ' DE'; // "un millón DE pesos" / "dos millones DE pesos"
    }
  } else {
    texto = menos1M(entero) || 'CERO';
  }

  texto = texto.trim() + ' PESOS ' + String(cents).padStart(2,'0') + '/100 M.N.';
  return texto;
}

function updateMontoLetra() {
  const val = parseFloat(document.getElementById('f-monto').value);
  const display = document.getElementById('monto-letra-display');
  if (!val || val <= 0) {
    display.textContent = 'El monto en letra aparecerá aquí automáticamente.';
  } else {
    display.textContent = '→ ' + numeroALetra(val);
  }
}

// ── Formatear fecha en español ──
function formatFechaLarga(iso) {
  if (!iso) return '_____ de _____________ de _____';
  const [y, m, d] = iso.split('-').map(Number);
  const MESES = ['','enero','febrero','marzo','abril','mayo','junio',
    'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${d} de ${MESES[m]} de ${y}`;
}

// ── Campo con estilo: rojo si vacío, negro si lleno ──
function campo(val, placeholder) {
  if (val && val.trim()) {
    return `<span class="doc-campo filled">${val.trim()}</span>`;
  }
  return `<span class="doc-campo">${placeholder}</span>`;
}

// ── Renderizar vista previa ──
// ── Paginación: divide el contenido crudo en hojas tamaño Carta ──
// Los bloques (párrafos, secciones, listas, bloque de firmas, etc.) se tratan
// como unidades atómicas: si uno no cabe en el espacio restante de la hoja,
// se mueve completo a la siguiente (así no se corta un párrafo o firma a la mitad).
const PAGE_CONTENT_HEIGHT = 992; // alto útil aprox. de una hoja Carta con los márgenes de impresión

// Devuelve un array de strings HTML, uno por hoja — usado tanto por la vista
// previa en pantalla como por la descarga en PDF, para que ambas coincidan siempre.
function computePages() {
  const raw = document.getElementById('contrato-raw');
  if (!raw) return [''];

  const measurer = document.createElement('div');
  measurer.style.cssText = 'position:fixed;left:-99999px;top:0;width:664px;font-family:Arial,sans-serif;font-size:10pt;line-height:1.5;';
  document.body.appendChild(measurer);

  const nodes = Array.from(raw.children);
  const pagesHTML = [];
  let currentHTML = '';

  nodes.forEach(node => {
    const nodeHTML = node.outerHTML;
    measurer.innerHTML = currentHTML + nodeHTML;
    const newHeight = measurer.scrollHeight;

    if (newHeight > PAGE_CONTENT_HEIGHT && currentHTML !== '') {
      pagesHTML.push(currentHTML);
      currentHTML = nodeHTML;
    } else {
      currentHTML += nodeHTML;
    }
  });
  if (currentHTML) pagesHTML.push(currentHTML);
  if (pagesHTML.length === 0) pagesHTML.push('');

  document.body.removeChild(measurer);
  return pagesHTML;
}

function renderPaginated() {
  const stack = document.getElementById('contrato-preview');
  if (!stack) return;

  const pagesHTML = computePages();

  stack.innerHTML = pagesHTML.map((html, i) => `
    <div class="page">
      ${html}

// ── Campo con estilo: rojo si vacío, negro si lleno (reutilizado) ──
function campoDoc(val, placeholder) {
  if (val && val.toString().trim()) return `<span class="doc-campo filled">${val.toString().trim()}</span>`;
  return `<span class="doc-campo">${placeholder}</span>`;
}

function renderClientesFields() {
  const n = parseInt(document.getElementById('pv-num-clientes')?.value || '1') || 1;
  const cont = document.getElementById('pv-clientes-fields');
  if (!cont) return;
  let html = '';
  for (let i = 0; i < n; i++) {

    const prevVal = prev ? prev.value : '';
    html += `

  cont.innerHTML = html;
}

function nombreArchivoContrato() {
  const n = parseInt(document.getElementById('pv-num-clientes')?.value || '1') || 1;
  const nombres = Array.from({ length: n }, (_, i) => (document.getElementById('pv-c' + i + '-nombre') || {}).value || '')
    .map(v => v.trim())
    .filter(Boolean);

  let nombre = 'Aviso de Privacidad';
  if (nombres.length === 1) {
    nombre += ' - ' + nombres[0];
  } else if (nombres.length > 1) {
    nombre += ' - ' + nombres[0] + ' y ' + (nombres.length - 1) + ' más';
  }
  return nombre;
}

function downloadPDF() {
  // Usamos las mismas hojas ya paginadas de la vista previa (con numeración),
  // así el PDF sale idéntico a lo que se ve en pantalla.
  const pages = computePages();
  const nombreArchivo = nombreArchivoContrato();

  const pagesHTML = pages.map((html, i) => {
    // Limpiar campos vacíos → línea en blanco, por cada hoja
    const wrapper = document.createElement('div');

    wrapper.querySelectorAll('.doc-campo:not(.filled)').forEach(el => {
      el.style.color = '#000';
      el.style.borderBottom = '1px solid #000';

    return `<div class="print-page"${isLast ? '' : ' style="page-break-after:always;"'}>
      ${wrapper.innerHTML}
      <div class="print-page-number">Página ${i + 1} de ${pages.length}</div>

  printWin.document.write(`<!DOCTYPE html>

// ── Descarga como Word (.docx) ──
// ── Carga diferida de la librería que genera el .docx real ──
function ensureHtmlDocxLoaded() {
  return new Promise((resolve, reject) => {
    if (window.htmlDocx) return resolve();
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/html-docx-js/dist/html-docx.js';
    script.onload = () => resolve();
    script.onerror = () => reject(new Error('No se pudo cargar el generador de Word. Revisa tu conexión a internet.'));
    document.head.appendChild(script);
  });
}

// Inicializar preview al cargar
document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('pv-num-clientes');
  if (sel) {
    let opts = '';
    for (let i = 1; i <= 20; i++) opts += `<option value="${i}">${i}</option>`;
    sel.innerHTML = opts;
  }
  renderClientesFields();
  updatePreview();
});

function fitPreviewMobile() {
  if (window.innerWidth > 900) return;
  const previewCol = document.querySelector('.acuerdos-preview-col');
  if (!previewCol || previewCol.style.display === 'none') return;
  const pages = previewCol.querySelectorAll('.page');
  if (!pages.length) return;
  const availWidth = previewCol.clientWidth - 24;
  const scale = Math.min(1, availWidth / 816);
  pages.forEach(page => {
    let wrap = page.parentElement;
    if (!wrap.classList.contains('page-scale-wrap')) {
      wrap = document.createElement('div');
      wrap.className = 'page-scale-wrap';
      page.parentNode.insertBefore(wrap, page);
      wrap.appendChild(page);
    }
    page.style.transform = `scale(${scale})`;
    wrap.style.width = (816 * scale) + 'px';
    wrap.style.height = (1056 * scale) + 'px';
  });
}

function showMobileTab(tab) {
  const formCol = document.querySelector('.acuerdos-form-col');
  const previewCol = document.querySelector('.acuerdos-preview-col');
  document.querySelectorAll('.mobile-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (!formCol || !previewCol) return;
  if (window.innerWidth > 900) {
    formCol.style.display = '';
    previewCol.style.display = '';
    return;
  }
  if (tab === 'form') {
    formCol.style.display = '';
    previewCol.style.display = 'none';
  } else {
    formCol.style.display = 'none';
    previewCol.style.display = '';
    requestAnimationFrame(fitPreviewMobile);
  }
}

window.addEventListener('resize', () => {
  const formCol = document.querySelector('.acuerdos-form-col');
  const previewCol = document.querySelector('.acuerdos-preview-col');
  if (window.innerWidth > 900) {
    if (formCol) formCol.style.display = '';
    if (previewCol) previewCol.style.display = '';
  } else {
    fitPreviewMobile();
  }
});

document.addEventListener('DOMContentLoaded', () => { showMobileTab('form'); });
</script>
